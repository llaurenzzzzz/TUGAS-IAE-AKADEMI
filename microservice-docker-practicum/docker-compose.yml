services:
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "3001:3001"
    networks:
      - microservice-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:3001
    depends_on:
      - product-service
    networks:
      - microservice-network

  python-service:
    build: ./python-service
    container_name: python-service
    ports:
      - "5000:5000"
    networks:
      - microservice-network

  laravel-service:
    build: ./laravel-service
    container_name: laravel-service
    ports:
      - "8000:8000"
    networks:
      - microservice-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
      - PYTHON_SERVICE_URL=http://python-service:5000
      - LARAVEL_SERVICE_URL=http://laravel-service:8000
    depends_on:
      - product-service
      - order-service
      - python-service
      - laravel-service
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge